services:
  - type: web
    name: ammas-kitchen-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --threads 50 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
      # Add other necessary environment variables here, like SECRET_KEY and Database URIs
